<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano Fundadora — Conexão Psi</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
:root {
  --plum:#2D1B4E;
  --gold:#C8934A;
  --cream:#FAF7F2;
  --text:#2a1f3d;
  --muted:#7a6e8a;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Outfit,sans-serif;
  background:var(--cream);
  color:var(--text);
}

/* GATE */
#gate{
  position:fixed;
  inset:0;
  background:var(--plum);
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:9999;
  padding:32px;
  text-align:center;
}

#gate h1{
  font-family:"Cormorant Garamond",serif;
  color:var(--cream);
  margin-bottom:10px;
}

#gate input{
  padding:14px;
  width:100%;
  max-width:300px;
  border-radius:10px;
  border:1px solid rgba(200,147,74,.4);
  text-align:center;
  margin:10px 0;
}

#gate button{
  padding:12px 20px;
  background:var(--gold);
  border:none;
  border-radius:10px;
  font-weight:600;
  cursor:pointer;
}

#error{
  display:none;
  color:#ff8a80;
  font-size:13px;
  margin-top:10px;
}

/* HERO */
.hero{
  padding:40px 20px;
  text-align:center;
  background:var(--plum);
  color:white;
}

.hero em{color:var(--gold)}

/* PRICE */
.price{
  padding:20px;
  text-align:center;
}

.card{
  background:white;
  padding:24px;
  border-radius:16px;
  max-width:400px;
  margin:auto;
}

/* CTA */
.cta{
  padding:30px 20px;
  text-align:center;
}

.cta a{
  display:block;
  margin:10px auto;
  padding:14px;
  max-width:320px;
  border-radius:12px;
  text-decoration:none;
  font-weight:600;
}

.primary{
  background:var(--gold);
  color:white;
}

.secondary{
  border:1px solid var(--plum);
  color:var(--plum);
  background:transparent;
}
</style>
</head>

<body>

<!-- GATE ÚNICO -->
<div id="gate">
  <h1>Conexão <span style="color:#C8934A">Psi</span></h1>
  <p style="color:rgba(255,255,255,.6);font-size:12px">Área exclusiva</p>

  <input id="senha" type="password" placeholder="Digite a senha">

  <button onclick="check()">Entrar</button>

  <div id="error">Senha incorreta</div>
</div>

<!-- CONTEÚDO -->
<div id="content" style="display:none">

<div class="hero">
  <h1>Plano <em>Fundadora</em></h1>
  <p>Oferta exclusiva para profissionais da rede</p>
</div>

<div class="price">
  <div class="card">
    <p>R$ 14,00 / mês (3 meses)</p>
    <small>Depois: R$ 27,90</small>
  </div>
</div>

<div class="cta">
  <a class="primary" href="https://pay.kiwify.com.br/O5SVu87?coupon=FUNDADORA">
    Assinar agora
  </a>

  <a class="secondary" href="https://tinyurl.com/ConexaoPsiRede">
    Ver perfil
  </a>
</div>

</div>

<script>
function check(){
  const senha = document.getElementById("senha").value.trim().toLowerCase();

  if(
    senha === "conexaopsi" ||
    senha === "conexão psi" ||
    senha === "fundadora"
  ){
    document.getElementById("gate").style.display="none";
    document.getElementById("content").style.display="block";
  } else {
    document.getElementById("error").style.display="block";
  }
}
</script>

</body>
</html>
