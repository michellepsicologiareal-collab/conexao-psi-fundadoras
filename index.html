<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plano Fundadora — Conexão Psi</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  background:#f5f3ef;
  color:#2a1f3d;
}

.container{
  max-width:600px;
  margin:60px auto;
  padding:24px;
  background:white;
  border-radius:16px;
  box-shadow:0 6px 20px rgba(0,0,0,0.08);
}

h1{
  margin-bottom:10px;
}

.price{
  font-size:40px;
  font-weight:bold;
  color:#2D1B4E;
  margin:10px 0;
}

.old{
  color:#777;
  font-size:14px;
}

.badge{
  display:inline-block;
  background:#2D1B4E;
  color:white;
  padding:6px 12px;
  border-radius:20px;
  font-size:12px;
  margin-bottom:20px;
}

ul{
  padding-left:18px;
}

button{
  margin-top:20px;
  width:100%;
  padding:14px;
  border:none;
  border-radius:10px;
  background:#C8934A;
  color:white;
  font-size:16px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.footer{
  text-align:center;
  font-size:12px;
  color:#777;
  margin-top:20px;
}
</style>

</head>

<body>

<div class="container">

  <div class="badge">Oferta exclusiva</div>

  <h1>Plano Fundadora</h1>
  <p>Oferta exclusiva para profissionais da rede</p>

  <p class="price">R$14,00</p>
  <p>por mês</p>

  <p class="old">Depois: R$27,90/mês</p>

  <h3>Benefícios</h3>

  <ul>
    <li>Bio completa</li>
    <li>Destaque no diretório</li>
    <li>WhatsApp no perfil</li>
  </ul>

  <button>Assinar agora</button>

  <div class="footer">
    Conexão Psi — Rede de psicólogas
  </div>

</div>

</body>
</html>
