<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Conexão Psi</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      margin: 0;
      padding: 0;
      color: #222;
    }

    header {
      background: #2d6cdf;
      color: white;
      padding: 20px;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 12px;
      padding: 25px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.08);
    }

    .title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    .price {
      font-size: 28px;
      color: #2d6cdf;
      margin: 10px 0;
    }

    .old-price {
      text-decoration: line-through;
      color: #888;
      font-size: 14px;
    }

    ul {
      padding-left: 18px;
    }

    li {
      margin: 8px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      background: #2d6cdf;
      color: white;
      padding: 12px 20px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: bold;
    }

    .btn:hover {
      background: #1f4fb0;
    }

    footer {
      text-align: center;
      padding: 20px;
      font-size: 12px;
      color: #777;
    }
  </style>
</head>

<body>

<header>
  <h1>Conexão Psi — Rede de Psicólogas</h1>
</header>

<div class="container">

  <div class="card">
    <div class="title">Plano Fundadora</div>
    <p>Oferta exclusiva para profissionais da rede</p>

    <div class="price">R$14,00 / mês</div>
    <div class="old-price">Depois: R$27,90/mês</div>

    <h3>Benefícios</h3>
    <ul>
      <li>Bio completa</li>
      <li>Destaque no diretório</li>
      <li>WhatsApp no perfil</li>
    </ul>

    <a class="btn" href="#">Assinar agora</a>
  </div>

</div>

<footer>
  Conexão Psi — Rede de psicólogas
</footer>

</body>
</html>
